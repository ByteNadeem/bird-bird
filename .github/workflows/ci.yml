name: Bird Bird CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      run_weekly_refresh:
        description: "Also run the weekly refresh pipeline"
        required: false
        default: "false"
  schedule:
    # Every Monday at 03:17 UTC
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: bird-bird-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (${{ matrix.os }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build migration database (integrated)
        run: |
          python scripts/init_migration_db.py --replace --seed-from-cleaned

      - name: API smoke checks
        shell: python
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          from backend.app import app

          client = app.test_client()
          checks = [
              ("/api/species?limit=20", 200),
              ("/api/migration/?limit=10", 200),
              ("/api/visualization/?species_code=eurcur", 200),
              ("/api/internal/collectibles/individuals?limit=5", 200),
              ("/api/collectibles/individuals", 404),
          ]

          for path, expected in checks:
              response = client.get(path)
              print(f"{path} -> {response.status_code}")
              if response.status_code != expected:
                  raise SystemExit(
                      f"Unexpected status for {path}: {response.status_code} (expected {expected})"
                  )

  weekly-refresh:
    name: Weekly Refresh Pipeline
    if: github.event_name == 'schedule' || github.event.inputs.run_weekly_refresh == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Refresh Movebank SQLite core tables
        run: |
          python scripts/load_movebank_sqlite.py --truncate-core
          python scripts/verify_movebank_sqlite.py

      - name: Rebuild cleaned and migration layers (integrated)
        run: |
          python scripts/data_cleaning.py --replace-table
          python scripts/init_migration_db.py --replace --seed-from-cleaned
          python scripts/data_coverage.py

      - name: API call checks after refresh
        shell: python
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          from backend.app import app

          client = app.test_client()
          paths = [
              "/api/species?limit=50",
              "/api/migration/?limit=25",
              "/api/routes/?limit=100",
              "/api/visualization/?species_code=eurcur&limit_points=300",
              "/api/internal/collectibles/individuals?limit=10",
          ]

          for path in paths:
              response = client.get(path)
              print(f"{path} -> {response.status_code}")
              if response.status_code != 200:
                  raise SystemExit(f"Refresh API check failed: {path} -> {response.status_code}")

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-refresh-artifacts
          path: |
            backend/database/*.db
            docs/coverage_metrics.json
            docs/coverage_report.md
          if-no-files-found: warn
