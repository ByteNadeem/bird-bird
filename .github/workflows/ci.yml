name: Bird Bird CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      run_weekly_refresh:
        description: "Also run the weekly refresh pipeline"
        required: true 
        default: "true"
  schedule:
    # Every Monday at 03:17 UTC
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: bird-bird-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (${{ matrix.os }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install test runner
        run: |
          python -m pip install pytest

      - name: Create Movebank raw fixture for CI
        shell: python
        run: |
          import json
          from pathlib import Path

          output_path = Path("backend/data/raw/movebank_events_ci.json")
          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(
              json.dumps(
                  [
                      {
                          "timestamp": "2026-01-01T00:00:00",
                          "deployment_id": "ci",
                          "location_lat": 52.52,
                          "location_long": 13.405,
                      }
                  ],
                  indent=2,
              ),
              encoding="utf-8",
          )

      - name: Build cleaned + migration databases (integrated)
        run: |
          python scripts/data_cleaning.py --replace-table --input-glob backend/data/raw/movebank_events_ci.json
          python scripts/init_migration_db.py --replace --seed-from-cleaned

      - name: Run non-destructive smoke tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -q -k "migration or cleaned_observations or coverage"

      - name: API smoke checks
        shell: python
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          from backend.app import app

          client = app.test_client()
          checks = [
              ("/api/species?limit=20", 200),
              ("/api/migration/?limit=10", 200),
              ("/api/visualization/?species_code=eurcur", 200),
              ("/api/internal/collectibles/individuals?limit=5", 200),
              ("/api/collectibles/individuals", 404),
          ]

          for path, expected in checks:
              response = client.get(path)
              print(f"{path} -> {response.status_code}")
              if response.status_code != expected:
                  raise SystemExit(
                      f"Unexpected status for {path}: {response.status_code} (expected {expected})"
                  )

  weekly-refresh:
    name: Weekly Refresh Pipeline
    if: github.event_name == 'schedule' || github.event.inputs.run_weekly_refresh == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install test runner
        run: |
          python -m pip install pytest

      - name: Fetch Movebank raw inputs for weekly refresh
        shell: python
        env:
          MOVEBANK_USERNAME: ${{ secrets.MOVEBANK_USERNAME }}
          MOVEBANK_PASSWORD: ${{ secrets.MOVEBANK_PASSWORD }}
        run: |
          import json
          import os
          from pathlib import Path

          from movebank_api import get_individuals_by_study, get_studies, filter_studies

          username = (os.getenv("MOVEBANK_USERNAME") or "").strip()
          password = (os.getenv("MOVEBANK_PASSWORD") or "").strip()
          if not username or not password:
              raise SystemExit("Missing MOVEBANK_USERNAME or MOVEBANK_PASSWORD secret.")

          studies = get_studies(
              username=username,
              password=password,
              timeout_seconds=60,
          )

          filtered = filter_studies(
              studies,
              sensor_name="GPS",
              require_download_access=True,
              taxon_queries=[
                  "Scolopax rusticola",
                  "Gallinago gallinago",
                  "Numenius arquata",
              ],
          )

          if not filtered:
              raise SystemExit("No studies matched weekly refresh filters.")

          out_dir = Path("backend/data/raw")
          out_dir.mkdir(parents=True, exist_ok=True)

          studies_path = out_dir / "movebank_studies_weekly.json"
          studies_path.write_text(json.dumps(filtered, indent=2), encoding="utf-8")

          study_ids = sorted({int(s["id"]) for s in filtered if s.get("id")})

          all_individuals = []
          for sid in study_ids:
              individuals = get_individuals_by_study(
                  study_id=sid,
                  username=username,
                  password=password,
                  timeout_seconds=60,
              )
              for row in individuals:
                  # Guarantee study_id for downstream loader consistency.
                  row["study_id"] = row.get("study_id") or str(sid)
              all_individuals.extend(individuals)

          if not all_individuals:
              raise SystemExit("No individuals fetched for filtered studies.")

          individuals_path = out_dir / "movebank_individuals_weekly.json"
          individuals_path.write_text(json.dumps(all_individuals, indent=2), encoding="utf-8")

          print(f"Saved studies: {len(filtered)} -> {studies_path}")
          print(f"Saved individuals: {len(all_individuals)} -> {individuals_path}")

      - name: Refresh Movebank SQLite core tables
        run: |
          python scripts/load_movebank_sqlite.py --truncate-core --study-glob backend/data/raw/movebank_studies_weekly.json --individual-glob backend/data/raw/movebank_individuals_weekly.json
          python scripts/verify_movebank_sqlite.py

      - name: Rebuild cleaned and migration layers (integrated)
        run: |
          python scripts/data_cleaning.py --replace-table
          python scripts/init_migration_db.py --replace --seed-from-cleaned
          python scripts/data_coverage.py

      - name: Run non-destructive smoke tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -q -k "migration or cleaned_observations or coverage"

      - name: API call checks after refresh
        shell: python
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          from backend.app import app

          client = app.test_client()
          paths = [
              "/api/species?limit=50",
              "/api/migration/?limit=25",
              "/api/routes/?limit=100",
              "/api/visualization/?species_code=eurcur&limit_points=300",
              "/api/internal/collectibles/individuals?limit=10",
          ]

          for path in paths:
              response = client.get(path)
              print(f"{path} -> {response.status_code}")
              if response.status_code != 200:
                  raise SystemExit(f"Refresh API check failed: {path} -> {response.status_code}")

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-refresh-artifacts
          path: |
            backend/database/*.db
            docs/coverage_metrics.json
            docs/coverage_report.md
          if-no-files-found: warn
